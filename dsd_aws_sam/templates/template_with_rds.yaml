AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  {{ stack_name }} - Django application deployed on AWS Lambda with RDS PostgreSQL.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Parameters:
  Stage:
    Type: String
    Default: { { stage } }
    AllowedValues:
      - dev
      - staging
      - prod
  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    Description: RDS instance class
  DBName:
    Type: String
    Default: djangodb
  DBUsername:
    Type: String
    Default: djangouser

Resources:
  # --- VPC and Networking ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-a"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-b"

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-a"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # --- Security Groups ---
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Django Lambda function
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS PostgreSQL
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  # --- RDS PostgreSQL ---
  DBPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-db-password"
      GenerateSecretString:
        ExcludePunctuation: true
        PasswordLength: 32

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${AWS::StackName}-db"
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: "16.4"
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub "{% templatetag openvariable %}resolve:secretsmanager:${DBPassword}{% templatetag closevariable %}"
      AllocatedStorage: 20
      StorageType: gp3
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      DeletionProtection: false

  # --- Lambda Function ---
  DjangoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-DjangoFunction"
      Handler: lambda_handler.handler
      Runtime: python3.12
      CodeUri: .
      Architectures:
        - { { architecture } }
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
      Environment:
        Variables:
          DEBUG: "False"
          DJANGO_SECRET_KEY: !Sub "{% templatetag openvariable %}resolve:secretsmanager:${DjangoSecretKey}{% templatetag closevariable %}"
          STATIC_FILES_BUCKET: !Ref StaticFilesBucket
          ALLOWED_HOSTS: !Sub ".execute-api.${AWS::Region}.amazonaws.com"
          CSRF_TRUSTED_ORIGINS: !Sub "https://*.execute-api.${AWS::Region}.amazonaws.com"
          DATABASE_URL: !Sub
            - "postgres://${DBUsername}:{% templatetag openvariable %}resolve:secretsmanager:${DBPassword}{% templatetag closevariable %}@${DBHost}:5432/${DBName}"
            - DBHost: !GetAtt RDSInstance.Endpoint.Address
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref StaticFilesBucket
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DjangoSecretKey
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DBPassword
        - VPCAccessPolicy: {}
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Use the reserved $default stage so API Gateway does not prepend a stage
      # segment (e.g. "/dev") to the request path. Django then receives requests
      # at the paths declared in its URLconf, and reverse()/"url" output
      # stays correct. Per-environment isolation is handled by deploying to
      # separate stacks/APIs, not by distinct stage names on a shared API.
      StageName: "$default"
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"

  # --- Static Files ---
  StaticFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-static-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  StaticFilesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticFilesBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${StaticFilesBucket.Arn}/static/*"

  DjangoSecretKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-django-secret-key"
      Description: "Django SECRET_KEY for the Lambda deployment"
      GenerateSecretString:
        ExcludePunctuation: false
        PasswordLength: 50

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  FunctionName:
    Description: "Lambda function name (for management commands)"
    Value: !Ref DjangoFunction
  StaticBucket:
    Description: "S3 bucket for static files"
    Value: !Ref StaticFilesBucket
  RDSEndpoint:
    Description: "RDS PostgreSQL endpoint"
    Value: !GetAtt RDSInstance.Endpoint.Address
